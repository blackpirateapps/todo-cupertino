name: Android APK

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Generate Android platform files
        run: flutter create --platforms=android --project-name todo_cupertino .

      - name: Enable core library desugaring (required by notifications plugin)
        run: |
          set -euo pipefail

          if [ -f android/app/build.gradle ]; then
            if ! grep -q "coreLibraryDesugaringEnabled true" android/app/build.gradle; then
              perl -0777 -i -pe 's/(compileOptions\s*\{\s*sourceCompatibility\s*=\s*JavaVersion\.[^\n]+\s*targetCompatibility\s*=\s*JavaVersion\.[^\n]+\s*)/$1        coreLibraryDesugaringEnabled true\n/s' android/app/build.gradle
            fi
            if ! grep -q "desugar_jdk_libs" android/app/build.gradle; then
              perl -0777 -i -pe 's/dependencies\s*\{\n/dependencies {\n    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"\n/s' android/app/build.gradle
            fi
            if ! grep -q "desugar_jdk_libs" android/app/build.gradle; then
              cat <<'EOG' >> android/app/build.gradle

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
}
EOG
            fi
          fi

          if [ -f android/app/build.gradle.kts ]; then
            if ! grep -q "isCoreLibraryDesugaringEnabled = true" android/app/build.gradle.kts; then
              perl -0777 -i -pe 's/(compileOptions\s*\{\s*sourceCompatibility\s*=\s*JavaVersion\.[^\n]+\s*targetCompatibility\s*=\s*JavaVersion\.[^\n]+\s*)/$1        isCoreLibraryDesugaringEnabled = true\n/s' android/app/build.gradle.kts
            fi
            if ! grep -q "desugar_jdk_libs" android/app/build.gradle.kts; then
              perl -0777 -i -pe 's/dependencies\s*\{\n/dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")\n/s' android/app/build.gradle.kts
            fi
            if ! grep -q "desugar_jdk_libs" android/app/build.gradle.kts; then
              cat <<'EOK' >> android/app/build.gradle.kts

dependencies {
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")
}
EOK
            fi
          fi

          echo "----- android/app/build.gradle -----"
          [ -f android/app/build.gradle ] && cat android/app/build.gradle || true
          echo "----- android/app/build.gradle.kts -----"
          [ -f android/app/build.gradle.kts ] && cat android/app/build.gradle.kts || true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: todo-cupertino-apk
          path: build/app/outputs/flutter-apk/*.apk
